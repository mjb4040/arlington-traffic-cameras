name: Deploy to Google Cloud Storage

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/464092073610/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deployer@traffic-cams-arlintgton.iam.gserviceaccount.com

      - name: Sync files to GCS bucket
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: .
          destination: michaelblackwell-arlington-traffic-map-2026
          glob: "**/*"
          parent: false
