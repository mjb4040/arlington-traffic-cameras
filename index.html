<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Arlington County · Traffic & Mobility</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        height: 100%;
        font-family: 'Inter', system-ui, sans-serif;
        background: #0f1923;
      }

      #app {
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      /* ── Top bar ─────────────────────────────────────────── */
      #topbar {
        flex-shrink: 0;
        background: #1b2a3b;
        border-bottom: 1px solid #243547;
        height: 52px;
        display: flex;
        align-items: center;
        padding: 0 16px;
        gap: 12px;
        z-index: 10;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }

      .brand-dot {
        width: 8px;
        height: 8px;
        background: #4a9eff;
        border-radius: 50%;
        flex-shrink: 0;
      }

      .brand-name {
        color: #ffffff;
        font-size: 14px;
        font-weight: 600;
        white-space: nowrap;
      }

      .brand-sub {
        color: #5a7a9a;
        font-size: 13px;
        font-weight: 400;
        white-space: nowrap;
      }

      /* ── Main content area (sidebar + map) ───────────────── */
      #content {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      /* ── Sidebar ─────────────────────────────────────────── */
      #sidebar {
        width: 220px;
        flex-shrink: 0;
        background: #1b2a3b;
        border-right: 1px solid #243547;
        display: flex;
        flex-direction: column;
        padding: 16px 12px;
        gap: 20px;
        overflow-y: auto;
        z-index: 5;
      }

      .sidebar-section {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .sidebar-label {
        font-size: 10px;
        font-weight: 600;
        color: #3a5a7a;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 2px;
      }

      /* ── Search ──────────────────────────────────────────── */
      .search-wrap {
        display: flex;
        align-items: center;
        gap: 6px;
        background: #243547;
        border: 1px solid #2e4560;
        border-radius: 6px;
        padding: 0 10px;
        width: 100%;
      }

      .search-icon {
        color: #5a7a9a;
        font-size: 13px;
        flex-shrink: 0;
      }

      #cameraSearch {
        background: transparent;
        border: none;
        outline: none;
        color: #c8d8e8;
        font-size: 13px;
        font-family: inherit;
        width: 100%;
        height: 34px;
      }

      #cameraSearch::placeholder { color: #3a5a7a; }

      .search-clear {
        background: none;
        border: none;
        color: #3a5a7a;
        cursor: pointer;
        font-size: 14px;
        padding: 2px;
        display: none;
      }

      /* ── Toggle buttons ──────────────────────────────────── */
      .toggle-btn {
        background: #243547;
        border: 1px solid #2e4560;
        color: #5a7a9a;
        font-size: 13px;
        font-family: inherit;
        padding: 8px 12px;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.15s;
        white-space: nowrap;
        display: flex;
        align-items: center;
        gap: 6px;
        width: 100%;
        text-align: left;
      }

      .toggle-btn.active {
        background: #1e3a5a;
        border-color: #4a9eff;
        color: #c8d8e8;
      }

      .toggle-btn.active-bike {
        background: #1a3a2a;
        border-color: #3aaa6a;
        color: #c8d8e8;
      }

      /* ── Legend ──────────────────────────────────────────── */
      .legend {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .legend-item {
        display: flex;
        align-items: center;
        gap: 6px;
        color: #5a7a9a;
        font-size: 12px;
      }

      /* ── Stats ───────────────────────────────────────────── */
      .sidebar-stat {
        font-size: 12px;
        color: #3a5a7a;
      }

      .sidebar-stat span {
        color: #5a7a9a;
        font-weight: 500;
      }

      /* ── Map ─────────────────────────────────────────────── */
      #map { flex: 1; min-width: 0; }

      /* ── Footer ──────────────────────────────────────────── */
      #footer {
        flex-shrink: 0;
        background: #1b2a3b;
        border-top: 1px solid #243547;
        height: 30px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
      }

      .footer-left {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .footer-stat {
        color: #3a5a7a;
        font-size: 11px;
      }

      .footer-stat span {
        color: #5a7a9a;
        font-weight: 500;
      }

      .footer-attr {
        color: #2a3a4a;
        font-size: 11px;
      }

      /* ── Camera info popup ───────────────────────────────── */
      .info-window {
        min-width: 260px;
        max-width: 300px;
        font-family: 'Inter', system-ui, sans-serif;
        background: #1b2a3b;
        border-radius: 8px;
        overflow: hidden;
      }

      .info-header {
        background: #1e3a5a;
        padding: 10px 12px;
        border-bottom: 1px solid #243547;
      }

      .info-title {
        font-size: 13px;
        font-weight: 600;
        color: #e8f0f8;
        margin-bottom: 4px;
        line-height: 1.3;
      }

      .info-site {
        font-size: 11px;
        color: #5a7a9a;
      }

      .info-body {
        padding: 10px 12px;
      }

      .info-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 6px;
        font-size: 12px;
      }

      .info-label { color: #5a7a9a; }
      .info-value { color: #c8d8e8; font-weight: 500; }

      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
      }

      .status-dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
      }

      .badge-online  { background: #1a3a2a; color: #5add8a; }
      .badge-online .status-dot  { background: #5add8a; }
      .badge-offline { background: #3a1a1a; color: #ff6b6b; }
      .badge-offline .status-dot { background: #ff6b6b; }
      .badge-unknown { background: #2a2a2a; color: #888888; }
      .badge-unknown .status-dot { background: #888888; }

      .info-actions {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }

      .info-btn {
        flex: 1;
        padding: 6px 10px;
        border-radius: 5px;
        font-size: 12px;
        font-family: inherit;
        font-weight: 500;
        cursor: pointer;
        border: none;
        text-align: center;
        text-decoration: none;
        display: block;
      }

      .btn-primary {
        background: #4a9eff;
        color: #ffffff;
      }

      .btn-secondary {
        background: #243547;
        color: #7a9ab8;
        border: 1px solid #2e4560;
      }

      /* ── Live feed ───────────────────────────────────────── */
      .live-feed-container {
        margin-top: 8px;
        border-radius: 5px;
        overflow: hidden;
        background: #000;
        position: relative;
      }

      .live-feed-container video {
        width: 100%;
        display: block;
      }

      .live-badge {
        position: absolute;
        top: 5px;
        left: 5px;
        background: #cc2222;
        color: white;
        font-size: 9px;
        font-weight: 700;
        padding: 2px 5px;
        border-radius: 3px;
        letter-spacing: 0.5px;
        pointer-events: none;
      }

      .feed-error {
        padding: 10px;
        font-size: 11px;
        color: #3a5a7a;
        text-align: center;
        font-style: italic;
      }

      /* ── Bikeshare popup ─────────────────────────────────── */
      .bike-info-window {
        min-width: 220px;
        font-family: 'Inter', system-ui, sans-serif;
        background: #1b2a3b;
        border-radius: 8px;
        overflow: hidden;
      }

      .bike-header {
        background: #1a3a2a;
        padding: 10px 12px;
        border-bottom: 1px solid #243547;
      }

      .bike-title {
        font-size: 13px;
        font-weight: 600;
        color: #e8f0f8;
      }

      .bike-body { padding: 10px 12px; }

      .bike-stats {
        display: flex;
        gap: 8px;
        margin-bottom: 8px;
      }

      .bike-stat {
        flex: 1;
        text-align: center;
        padding: 8px;
        border-radius: 6px;
      }

      .bike-stat.bikes { background: #1a3a2a; }
      .bike-stat.docks { background: #1a2a3a; }

      .bike-stat-num {
        font-size: 22px;
        font-weight: 600;
        line-height: 1;
        margin-bottom: 3px;
      }

      .bike-stat.bikes .bike-stat-num { color: #5add8a; }
      .bike-stat.docks .bike-stat-num { color: #4a9eff; }

      .bike-stat-label {
        font-size: 10px;
        color: #3a5a7a;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .bike-meta { font-size: 11px; color: #3a5a7a; }

      /* Override Google Maps info window chrome */
      .gm-style .gm-style-iw-c {
        background: #1b2a3b !important;
        border-radius: 8px !important;
        box-shadow: 0 8px 24px rgba(0,0,0,0.4) !important;
        padding: 0 !important;
      }

      .gm-style .gm-style-iw-d {
        overflow: hidden !important;
        max-height: none !important;
      }

      .gm-style .gm-style-iw-t::after {
        background: #1b2a3b !important;
      }

      .gm-style-iw-tc::after {
        background: #1b2a3b !important;
      }

      button.gm-ui-hover-effect {
        filter: invert(1) !important;
        opacity: 0.5 !important;
      }
    </style>
  </head>
  <body>
    <div id="app">

      <div id="topbar">
        <div class="brand">
          <div class="brand-dot"></div>
          <span class="brand-name">Arlington County</span>
          <span class="brand-sub">Traffic & Mobility</span>
        </div>
      </div>

      <div id="content">

        <div id="sidebar">

          <div class="sidebar-section">
            <div class="sidebar-label">Search</div>
            <div class="search-wrap">
              <span class="search-icon">⌕</span>
              <input id="cameraSearch" type="text" placeholder="Search cameras..." />
              <button class="search-clear" id="clearBtn">✕</button>
            </div>
          </div>

          <div class="sidebar-section">
            <div class="sidebar-label">Layers</div>
            <button class="toggle-btn active" id="toggleCameraBtn">🚦 Cameras</button>
            <button class="toggle-btn active" id="toggleTrafficBtn">🚗 Traffic layer</button>
            <button class="toggle-btn" id="toggleBikeBtn">🚲 Bikeshare</button>
            <button class="toggle-btn" id="toggleFlightBtn">✈️ Flights</button>
          </div>

          <div class="sidebar-section">
            <div class="sidebar-label">Legend</div>
            <div class="legend">
              <div class="legend-item">🚦 Camera online</div>
              <div class="legend-item">🔴 Camera offline</div>
              <div class="legend-item">⚫ Status unknown</div>
              <div class="legend-item">🚲 Bikes available</div>
              <div class="legend-item">🔒 No bikes</div>
              <div class="legend-item">✈️ Aircraft</div>
            </div>
          </div>

          <div class="sidebar-section">
            <div class="sidebar-label">Stats</div>
            <div class="sidebar-stat" id="cameraCount">Loading...</div>
            <div class="sidebar-stat" id="bikeCount" style="display:none;">🚲 <span id="bikeCountNum">—</span> stations</div>
          </div>

        </div>

        <div id="map"></div>

      </div>

      <div id="footer">
        <div class="footer-left">
          <div class="footer-stat" id="cameraCount">Loading...</div>
          <div class="footer-stat" id="bikeCount" style="display:none;">🚲 <span id="bikeCountNum">—</span> stations</div>
        </div>
        <div class="footer-attr">
          Arlington Open Data · Capital Bikeshare GBFS · Built by Michael Blackwell
        </div>
      </div>

    </div>

    <script>
      let map, infoWindow;
      let allMarkers = [], clusterer = null;
      let trafficLayer = null, trafficVisible = true, cameraVisible = true;
      let bikeMarkers = [], bikeVisible = false;
      let bikeRefreshInterval = null, bikeStatusIndex = {};
      let arlingtonStationIds = new Set();

      // Flight layer state
      let flightMarkers = {}, flightVisible = false, flightInterval = null;

      const OPENSKY_URL = "https://us-east4-traffic-cams-arlintgton.cloudfunctions.net/opensky-proxy";
      const GBFS_INFO   = "https://gbfs.lyft.com/gbfs/2.3/dca-cabi/en/station_information.json";
      const GBFS_STATUS = "https://gbfs.lyft.com/gbfs/2.3/dca-cabi/en/station_status.json";
      const ARLINGTON_GIS = "https://arlgis.arlingtonva.us/arcgis/rest/services/Open_Data/od_Bike_Capital_Bikeshare_Stations_Points/FeatureServer/0/query?where=1%3D1&outFields=StationID&f=json";

      function escapeHtml(v) {
        return String(v ?? "")
          .replace(/&/g,"&amp;").replace(/</g,"&lt;")
          .replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");
      }

      function makeEmojiIcon(emoji) {
        const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 28 28">
          <text y="22" font-size="22" font-family="Apple Color Emoji,Segoe UI Emoji,sans-serif">${emoji}</text>
        </svg>`;
        return {
          url: "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg),
          scaledSize: new google.maps.Size(28, 28),
          anchor: new google.maps.Point(14, 14),
        };
      }

      function getMarkerIcon(status) {
        const s = (status || "").toUpperCase().trim();
        if (s === "ONLINE")  return makeEmojiIcon("🚦");
        if (s === "OFFLINE") return makeEmojiIcon("🔴");
        return makeEmojiIcon("⚫");
      }

      function getBikeIcon(bikes) {
        return makeEmojiIcon(bikes > 0 ? "🚲" : "🔒");
      }

      function getBadgeClass(status) {
        const s = (status || "").toUpperCase().trim();
        if (s === "ONLINE")  return "badge-online";
        if (s === "OFFLINE") return "badge-offline";
        return "badge-unknown";
      }

      function buildStreamUrl(camera) {
        let port = parseInt(camera.port);
        if (!port || isNaN(port)) return null;
        if (camera.port && camera.port.toString().startsWith("rtsp")) {
          const m = camera.port.match(/:(\d+)\//);
          if (m) port = parseInt(m[1]);
        }
        return `https://itsvideo.arlingtonva.us:${port + 10}/live/${(camera.camera_site||"").toLowerCase()}.stream/playlist.m3u8`;
      }

      function buildCameraPopup(c) {
        const status = (c.status || "UNKNOWN").toUpperCase().trim();
        const badgeClass = getBadgeClass(status);
        const mapsLink = `https://www.google.com/maps?q=${c.latitude},${c.longitude}`;
        const isOnline = status === "ONLINE";
        const streamUrl = buildStreamUrl(c);
        const canStream = isOnline && streamUrl;
        const vid = `vid-${escapeHtml(c.camera_site || Math.random())}`;

        return `<div class="info-window">
          <div class="info-header">
            <div class="info-title">${escapeHtml(c.camera_name || "Unknown camera")}</div>
            <div class="info-site">${escapeHtml(c.camera_site || "")}</div>
          </div>
          <div class="info-body">
            <div class="info-row">
              <span class="info-label">Status</span>
              <span class="status-badge ${badgeClass}">
                <span class="status-dot"></span>${escapeHtml(status)}
              </span>
            </div>
            <div class="info-row">
              <span class="info-label">Coordinates</span>
              <span class="info-value">${c.latitude.toFixed(5)}, ${c.longitude.toFixed(5)}</span>
            </div>
            ${canStream ? `
              <button class="info-btn btn-primary" onclick="loadFeed('${vid}','${streamUrl}',this)" style="margin-top:8px;width:100%;">▶ Watch live feed</button>
              <div class="live-feed-container" id="c-${vid}" style="display:none;">
                <video id="${vid}" controls muted playsinline></video>
                <span class="live-badge">LIVE</span>
              </div>
            ` : `<div class="feed-error">${isOnline ? "Live feed unavailable" : "Camera offline"}</div>`}
            <div class="info-actions">
              <a class="info-btn btn-secondary" href="${mapsLink}" target="_blank" rel="noopener">Open in Maps</a>
            </div>
          </div>
        </div>`;
      }

      function loadFeed(vid, url, btn) {
        const container = document.getElementById(`c-${vid}`);
        const video = document.getElementById(vid);
        btn.style.display = "none";
        container.style.display = "block";
        if (typeof Hls === "undefined") {
          container.innerHTML = '<div class="feed-error">Player not loaded.</div>'; return;
        }
        if (Hls.isSupported()) {
          const hls = new Hls({ maxBufferLength: 10 });
          hls.loadSource(url);
          hls.attachMedia(video);
          hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
          hls.on(Hls.Events.ERROR, (e, d) => {
            if (d.fatal) container.innerHTML = '<div class="feed-error">Stream unavailable.</div>';
          });
        } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
          video.src = url; video.play();
        } else {
          container.innerHTML = '<div class="feed-error">Browser does not support live streaming.</div>';
        }
      }

      function buildBikePopup(station, status) {
        const bikes = status ? status.num_bikes_available : "?";
        const docks = status ? status.num_docks_available : "?";
        const updated = status ? new Date(status.last_reported * 1000).toLocaleTimeString() : "—";
        return `<div class="bike-info-window">
          <div class="bike-header">
            <div class="bike-title">🚲 ${escapeHtml(station.name)}</div>
          </div>
          <div class="bike-body">
            <div class="bike-stats">
              <div class="bike-stat bikes">
                <div class="bike-stat-num">${bikes}</div>
                <div class="bike-stat-label">Bikes</div>
              </div>
              <div class="bike-stat docks">
                <div class="bike-stat-num">${docks}</div>
                <div class="bike-stat-label">Docks</div>
              </div>
            </div>
            <div class="bike-meta">Capacity: ${station.capacity} · Updated: ${updated}</div>
          </div>
        </div>`;
      }

      async function fetchBikeStatus() {
        try {
          const r = await fetch(GBFS_STATUS);
          const j = await r.json();
          bikeStatusIndex = {};
          for (const s of j.data.stations) bikeStatusIndex[s.station_id] = s;
          for (const m of bikeMarkers) {
            const st = bikeStatusIndex[m.stationId];
            m.setIcon(getBikeIcon(st ? st.num_bikes_available : 0));
          }
        } catch(e) { console.warn("Bike refresh failed", e); }
      }

      async function loadBikeMarkers() {
        try {
          const [gisR, infoR, statR] = await Promise.all([
            fetch(ARLINGTON_GIS), fetch(GBFS_INFO), fetch(GBFS_STATUS)
          ]);
          const gisJ  = await gisR.json();
          const infoJ = await infoR.json();
          const statJ = await statR.json();

          arlingtonStationIds = new Set(gisJ.features.map(f => String(f.attributes.StationID)));
          bikeStatusIndex = {};
          for (const s of statJ.data.stations) bikeStatusIndex[s.station_id] = s;

          bikeMarkers = [];
          for (const st of infoJ.data.stations) {
            if (!arlingtonStationIds.has(String(st.short_name))) continue;
            const status = bikeStatusIndex[st.station_id];
            const bikes  = status ? status.num_bikes_available : 0;
            const marker = new google.maps.Marker({
              position: { lat: st.lat, lng: st.lon },
              title: st.name,
              icon: getBikeIcon(bikes),
              map: null,
            });
            marker.stationId = st.station_id;
            marker.addListener("click", () => {
              infoWindow.setContent(buildBikePopup(st, bikeStatusIndex[st.station_id]));
              infoWindow.open({ map, anchor: marker });
            });
            bikeMarkers.push(marker);
          }

          document.getElementById("bikeCountNum").textContent = bikeMarkers.length;
        } catch(e) { console.warn("Bike load failed", e); }
      }

      function fitToMarkers(markers) {
        if (!markers.length) return;
        const bounds = new google.maps.LatLngBounds();
        markers.forEach(m => bounds.extend(m.getPosition()));
        map.fitBounds(bounds);
        google.maps.event.addListenerOnce(map, "bounds_changed", () => {
          if (map.getZoom() > 14) map.setZoom(14);
        });
      }

      function renderMarkers(markersToShow) {
        if (clusterer) clusterer.clearMarkers();
        allMarkers.forEach(m => m.setMap(null));
        markersToShow.forEach(m => m.setMap(map));
        clusterer = new markerClusterer.MarkerClusterer({ map, markers: markersToShow });
        document.getElementById("cameraCount").innerHTML =
          `🚦 <span>${markersToShow.length}</span> cameras`;
        if (markersToShow.length) fitToMarkers(markersToShow);
      }

      function applySearch() {
        const q = document.getElementById("cameraSearch").value.trim().toLowerCase();
        document.getElementById("clearBtn").style.display = q ? "block" : "none";
        if (!q) { renderMarkers(allMarkers); return; }
        const filtered = allMarkers.filter(m => {
          const c = m.cameraData;
          return [c.camera_name, c.camera_site, c.status, c.port]
            .filter(Boolean).some(v => String(v).toLowerCase().includes(q));
        });
        renderMarkers(filtered);
      }

      async function initMap() {
        map = new google.maps.Map(document.getElementById("map"), {
          center: { lat: 38.8816, lng: -77.0910 },
          zoom: 13,
          mapTypeControl: false,
          fullscreenControl: true,
          streetViewControl: false,
          scaleControl: true,
          styles: [
            { elementType: "geometry", stylers: [{ color: "#1a2535" }] },
            { elementType: "labels.text.stroke", stylers: [{ color: "#1a2535" }] },
            { elementType: "labels.text.fill", stylers: [{ color: "#6a8aaa" }] },
            { featureType: "road", elementType: "geometry", stylers: [{ color: "#243547" }] },
            { featureType: "road", elementType: "geometry.stroke", stylers: [{ color: "#1a2535" }] },
            { featureType: "road.highway", elementType: "geometry", stylers: [{ color: "#2e4a6a" }] },
            { featureType: "road.highway", elementType: "geometry.stroke", stylers: [{ color: "#1e3050" }] },
            { featureType: "water", elementType: "geometry", stylers: [{ color: "#0f1923" }] },
            { featureType: "poi", elementType: "geometry", stylers: [{ color: "#1e2f42" }] },
            { featureType: "poi.park", elementType: "geometry", stylers: [{ color: "#1a2f22" }] },
            { featureType: "transit", elementType: "geometry", stylers: [{ color: "#1e3050" }] },
            { featureType: "administrative", elementType: "geometry.stroke", stylers: [{ color: "#2e4560" }] },
          ],
        });

        trafficLayer = new google.maps.TrafficLayer();
        trafficLayer.setMap(map);
        infoWindow = new google.maps.InfoWindow({ maxWidth: 320 });

        const res = await fetch("./traffic_cameras_clean.json");
        const cameras = await res.json();
        const valid = cameras.filter(c =>
          typeof c.latitude === "number" && typeof c.longitude === "number" &&
          (c.camera_name || c.camera_site)
        );

        allMarkers = valid.map(c => {
          const m = new google.maps.Marker({
            position: { lat: c.latitude, lng: c.longitude },
            title: c.camera_name || c.camera_site || "Camera",
            icon: getMarkerIcon(c.status),
          });
          m.cameraData = c;
          m.addListener("click", () => {
            infoWindow.setContent(buildCameraPopup(c));
            infoWindow.open({ map, anchor: m });
          });
          return m;
        });

        renderMarkers(allMarkers);

        // Search
        document.getElementById("cameraSearch").addEventListener("input", applySearch);
        document.getElementById("clearBtn").addEventListener("click", () => {
          document.getElementById("cameraSearch").value = "";
          document.getElementById("clearBtn").style.display = "none";
          renderMarkers(allMarkers);
        });

        // Camera toggle
        document.getElementById("toggleCameraBtn").addEventListener("click", () => {
          cameraVisible = !cameraVisible;
          const btn = document.getElementById("toggleCameraBtn");
          if (cameraVisible) {
            renderMarkers(allMarkers);
            btn.classList.add("active");
            btn.classList.remove("toggle-btn");
            btn.className = "toggle-btn active";
          } else {
            allMarkers.forEach(m => m.setMap(null));
            if (clusterer) clusterer.clearMarkers();
            btn.className = "toggle-btn";
          }
        });

        // Traffic toggle
        document.getElementById("toggleTrafficBtn").addEventListener("click", () => {
          trafficVisible = !trafficVisible;
          trafficLayer.setMap(trafficVisible ? map : null);
          const btn = document.getElementById("toggleTrafficBtn");
          btn.className = trafficVisible ? "toggle-btn active" : "toggle-btn";
          btn.textContent = trafficVisible ? "Traffic layer" : "Traffic layer";
        });

        // Load bikeshare
        await loadBikeMarkers();

        // Bikeshare toggle
        document.getElementById("toggleBikeBtn").addEventListener("click", () => {
          bikeVisible = !bikeVisible;
          const btn = document.getElementById("toggleBikeBtn");
          const countEl = document.getElementById("bikeCount");
          if (bikeVisible) {
            bikeMarkers.forEach(m => m.setMap(map));
            bikeRefreshInterval = setInterval(fetchBikeStatus, 30000);
            btn.className = "toggle-btn active-bike";
            countEl.style.display = "block";
          } else {
            bikeMarkers.forEach(m => m.setMap(null));
            clearInterval(bikeRefreshInterval);
            btn.className = "toggle-btn";
            countEl.style.display = "none";
          }
        });

        // Flight toggle
        document.getElementById("toggleFlightBtn").addEventListener("click", async () => {
          flightVisible = !flightVisible;
          const btn = document.getElementById("toggleFlightBtn");
          if (flightVisible) {
            btn.className = "toggle-btn active";
            await fetchFlights();
            flightInterval = setInterval(fetchFlights, 15000);
          } else {
            btn.className = "toggle-btn";
            clearInterval(flightInterval);
            Object.values(flightMarkers).forEach(m => m.setMap(null));
            flightMarkers = {};
          }
        });
      }

      // ── Flight layer ───────────────────────────────────────
      //
      // Fundamental concept: OpenSky returns each aircraft as a raw array.
      // Field indices: 0=icao24, 1=callsign, 5=lon, 6=lat, 7=alt(m),
      // 8=on_ground, 9=velocity(m/s), 10=heading, 11=vertical_rate
      //
      // We render aircraft using a rotated plane SVG so the icon
      // points in the direction the aircraft is travelling.

      function makeFlightIcon(heading, onGround) {
        const deg = heading || 0;
        const color = onGround ? "#888888" : "#4a9eff";
        const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 28 28">
          <g transform="rotate(${deg}, 14, 14)">
            <text y="22" x="2" font-size="22" font-family="Apple Color Emoji,Segoe UI Emoji,sans-serif">✈️</text>
          </g>
        </svg>`;
        return {
          url: "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg),
          scaledSize: new google.maps.Size(28, 28),
          anchor: new google.maps.Point(14, 14),
        };
      }

      function buildFlightPopup(s) {
        const callsign  = (s[1] || "").trim() || "Unknown";
        const altM      = s[7];
        const altFt     = altM ? Math.round(altM * 3.28084).toLocaleString() : "—";
        const speedMs   = s[9];
        const speedKts  = speedMs ? Math.round(speedMs * 1.94384) : "—";
        const heading   = s[10] != null ? Math.round(s[10]) + "°" : "—";
        const vrate     = s[11];
        const vrateFpm  = vrate ? Math.round(vrate * 196.85) : 0;
        const vrateStr  = vrate ? (vrateFpm > 0 ? `+${vrateFpm}` : vrateFpm) + " fpm" : "—";
        const onGround  = s[8] ? "On ground" : "Airborne";
        const country   = s[2] || "—";
        const icao      = s[0] || "—";

        return `<div class="info-window">
          <div class="info-header">
            <div class="info-title">✈️ ${escapeHtml(callsign)}</div>
            <div class="info-site">${escapeHtml(icao)} · ${escapeHtml(country)}</div>
          </div>
          <div class="info-body">
            <div class="info-row"><span class="info-label">Status</span><span class="info-value">${onGround}</span></div>
            <div class="info-row"><span class="info-label">Altitude</span><span class="info-value">${altFt} ft</span></div>
            <div class="info-row"><span class="info-label">Speed</span><span class="info-value">${speedKts} kts</span></div>
            <div class="info-row"><span class="info-label">Heading</span><span class="info-value">${heading}</span></div>
            <div class="info-row"><span class="info-label">Vertical rate</span><span class="info-value">${vrateStr}</span></div>
          </div>
        </div>`;
      }

      async function fetchFlights() {
        try {
          const res  = await fetch(OPENSKY_URL);
          const json = await res.json();

          // Cloud Function returns {aircraft: [...]} with named fields
          // Convert back to OpenSky array format so the rest of the code works
          const states = json.aircraft
            ? json.aircraft.map(a => [
                a.icao24, a.callsign, a.country, null, null,
                a.longitude, a.latitude,
                a.altitude_ft ? a.altitude_ft / 3.28084 : null,
                a.on_ground,
                a.speed_kts ? a.speed_kts / 1.94384 : null,
                a.heading,
                a.vertical_fpm ? a.vertical_fpm / 196.85 : null,
                null, null, a.squawk, null, null
              ])
            : (json.states || []);

          const seen = new Set();

          for (const s of states) {
            const icao = s[0];
            const lat  = s[6];
            const lon  = s[5];
            if (!icao || lat == null || lon == null) continue;

            seen.add(icao);

            if (flightMarkers[icao]) {
              // Update existing marker position and icon
              flightMarkers[icao].setPosition({ lat, lng: lon });
              flightMarkers[icao].setIcon(makeFlightIcon(s[10], s[8]));
              flightMarkers[icao].stateVector = s;
            } else {
              // Create new marker
              const marker = new google.maps.Marker({
                position: { lat, lng: lon },
                title: (s[1] || "").trim() || icao,
                icon: makeFlightIcon(s[10], s[8]),
                map: flightVisible ? map : null,
              });
              marker.stateVector = s;
              marker.addListener("click", () => {
                infoWindow.setContent(buildFlightPopup(marker.stateVector));
                infoWindow.open({ map, anchor: marker });
              });
              flightMarkers[icao] = marker;
            }
          }

          // Remove markers for aircraft no longer in the area
          for (const icao of Object.keys(flightMarkers)) {
            if (!seen.has(icao)) {
              flightMarkers[icao].setMap(null);
              delete flightMarkers[icao];
            }
          }
        } catch(e) {
          console.warn("Flight fetch failed:", e);
        }
      }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
    <script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>
    <script
      src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAY5DaIF5Uuc3dEInFrfDxkZeC7WciFspk&callback=initMap"
      async defer
    ></script>
  </body>
</html>
