<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Arlington Traffic Cameras</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      html, body, #map {
        height: 100%;
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
      }

      #map {
        position: relative;
      }

      .map-panel {
        position: absolute;
        top: 14px;
        left: 14px;
        z-index: 5;
        width: 320px;
        background: rgba(255, 255, 255, 0.96);
        border-radius: 12px;
        box-shadow: 0 6px 18px rgba(0,0,0,0.18);
        padding: 14px;
      }

      .map-panel h1 {
        margin: 0 0 10px 0;
        font-size: 18px;
      }

      .map-panel p {
        margin: 0 0 10px 0;
        font-size: 13px;
        color: #444;
      }

      .search-row {
        display: flex;
        gap: 8px;
        margin-bottom: 10px;
      }

      .search-row input {
        flex: 1;
        padding: 10px 12px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 14px;
      }

      .search-row button {
        padding: 10px 12px;
        border: none;
        border-radius: 8px;
        background: #1a73e8;
        color: white;
        cursor: pointer;
        font-size: 14px;
      }

      .search-row button.secondary {
        background: #5f6368;
      }

      .legend {
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
        margin-top: 10px;
        font-size: 12px;
        color: #333;
      }

      .legend-item {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .legend-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        display: inline-block;
      }

      .legend-online  { background: #1e8e3e; }
      .legend-offline { background: #d93025; }
      .legend-unknown { background: #80868b; }
      .legend-bike    { background: #e65c00; }

      /* ── Bikeshare info window ────────────────────────────── */
      .bike-info-window {
        min-width: 220px;
        font-family: Arial, sans-serif;
      }

      .bike-info-title {
        margin: 0 0 8px 0;
        font-size: 15px;
        font-weight: 700;
        color: #202124;
      }

      .bike-availability {
        display: flex;
        gap: 10px;
        margin: 10px 0;
      }

      .bike-stat {
        flex: 1;
        text-align: center;
        padding: 8px;
        border-radius: 8px;
        background: #f1f3f4;
      }

      .bike-stat-number {
        font-size: 22px;
        font-weight: 700;
        color: #202124;
      }

      .bike-stat-label {
        font-size: 11px;
        color: #666;
        margin-top: 2px;
      }

      .bike-stat.bikes { background: #e8f5e9; }
      .bike-stat.bikes .bike-stat-number { color: #1e8e3e; }
      .bike-stat.docks { background: #e3f2fd; }
      .bike-stat.docks .bike-stat-number { color: #1a73e8; }

      .bike-capacity {
        font-size: 12px;
        color: #666;
        margin-top: 6px;
      }

      .bike-last-updated {
        font-size: 11px;
        color: #999;
        margin-top: 6px;
      }

      .result-count {
        margin-top: 8px;
        font-size: 13px;
        font-weight: 600;
      }

      /* ── Info window ─────────────────────────────────────── */
      .info-window {
        min-width: 280px;
        max-width: 320px;
        font-family: Arial, sans-serif;
      }

      .info-title {
        margin: 0 0 8px 0;
        font-size: 15px;
        font-weight: 700;
        color: #202124;
      }

      .info-row {
        margin: 4px 0;
        font-size: 13px;
        color: #333;
      }

      .status-badge {
        display: inline-block;
        padding: 4px 8px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        color: white;
      }

      .status-online  { background: #1e8e3e; }
      .status-offline { background: #d93025; }
      .status-unknown { background: #80868b; }

      .info-actions {
        margin-top: 10px;
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
      }

      .info-actions a {
        color: #1a73e8;
        text-decoration: none;
        font-size: 13px;
        font-weight: 600;
      }

      /* ── Live feed player ────────────────────────────────── */
      .live-feed-container {
        margin-top: 10px;
        border-radius: 8px;
        overflow: hidden;
        background: #000;
        position: relative;
      }

      .live-feed-container video {
        width: 100%;
        display: block;
        border-radius: 8px;
      }

      .live-badge {
        position: absolute;
        top: 6px;
        left: 6px;
        background: #d93025;
        color: white;
        font-size: 10px;
        font-weight: 700;
        padding: 2px 6px;
        border-radius: 4px;
        letter-spacing: 0.5px;
        pointer-events: none;
      }

      .feed-error {
        padding: 10px;
        font-size: 12px;
        color: #aaa;
        text-align: center;
      }

      .load-feed-btn {
        margin-top: 8px;
        padding: 7px 12px;
        background: #1a73e8;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
      }

      .load-feed-btn:hover {
        background: #1558b0;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>

    <div class="map-panel">
      <h1>Arlington Traffic Cameras</h1>
      <p>Search by camera name, site, status, or corridor.</p>

      <div class="search-row">
        <input id="cameraSearch" type="text" placeholder="Search cameras..." />
        <button id="searchBtn">Search</button>
        <button id="resetBtn" class="secondary">Reset</button>
      </div>

      <div class="search-row">
        <button id="toggleCameraBtn">Hide Cameras</button>
        <button id="toggleTrafficBtn">Hide Traffic</button>
        <button id="toggleBikeBtn" class="secondary">Show Bikeshare</button>
      </div>

      <div id="resultCount" class="result-count">Loading cameras...</div>

      <div class="legend">
        <div class="legend-item">🚦 <span>Online</span></div>
        <div class="legend-item">🔴 <span>Offline</span></div>
        <div class="legend-item">⚫ <span>Unknown</span></div>
        <div class="legend-item">🚲 <span>Bikes available</span></div>
        <div class="legend-item">🔒 <span>No bikes</span></div>
      </div>
    </div>

    <script>
      let map;
      let infoWindow;
      let allMarkers = [];
      let clusterer = null;
      let trafficLayer = null;
      let trafficVisible = true;

      // ── Bikeshare state ────────────────────────────────────
      let bikeMarkers = [];
      let bikeVisible = false;
      let bikeRefreshInterval = null;
      let bikeStatusIndex = {};

      const GBFS_STATION_INFO   = "https://gbfs.lyft.com/gbfs/2.3/dca-cabi/en/station_information.json";
      const GBFS_STATION_STATUS = "https://gbfs.lyft.com/gbfs/2.3/dca-cabi/en/station_status.json";

      // Arlington bounding box — only show stations inside the county
      const ARLINGTON = { latMin: 38.84, latMax: 38.94, lngMin: -77.17, lngMax: -77.03 };

      // ── Utilities ──────────────────────────────────────────

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function getStatusClass(status) {
        const s = (status || "").toUpperCase().trim();
        if (s === "ONLINE")  return "status-online";
        if (s === "OFFLINE") return "status-offline";
        return "status-unknown";
      }

      function getMarkerIcon(status) {
        const s = (status || "").toUpperCase().trim();
        // Fundamental concept: we render emoji inside an SVG so Google Maps
        // can use it as a marker image via a data URL. This avoids needing
        // any external image files.
        let emoji = "⚫";
        if (s === "ONLINE")  emoji = "🚦";
        if (s === "OFFLINE") emoji = "🔴";

        const svg = `
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 28 28">
            <text y="22" font-size="22" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif">${emoji}</text>
          </svg>`;

        return {
          url: "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg),
          scaledSize: new google.maps.Size(28, 28),
          anchor: new google.maps.Point(14, 14),
        };
      }

      // ── Live stream URL builder ────────────────────────────
      //
      // Fundamental concept:
      // Arlington streams HLS video over HTTPS. The port in our JSON
      // is the base port (e.g. 8001). The HLS port is always base + 10
      // (e.g. 8011). The stream path uses the camera_site ID.
      //
      // Formula discovered from Arlington's live camera page source:
      // https://itsvideo.arlingtonva.us:{port+10}/live/{camera_site}.stream/playlist.m3u8

      function buildStreamUrl(camera) {
        const port = parseInt(camera.port);
        if (!port || isNaN(port)) return null;

        // Extract numeric port if port field still has an old RTSP URL
        // e.g. "rtsp://158.59.15.203:8001/live/cam1.stream" → 8001
        let basePort = port;
        if (camera.port && camera.port.toString().startsWith("rtsp")) {
          const match = camera.port.match(/:(\d+)\//);
          if (match) basePort = parseInt(match[1]);
        }

        const hlsPort = basePort + 10;
        const site = (camera.camera_site || "").toLowerCase();
        return `https://itsvideo.arlingtonva.us:${hlsPort}/live/${site}.stream/playlist.m3u8`;
      }

      // ── Info window content ────────────────────────────────

      function buildInfoContent(camera) {
        const status = (camera.status || "UNKNOWN").toUpperCase().trim();
        const statusClass = getStatusClass(status);
        const mapsLink = `https://www.google.com/maps?q=${camera.latitude},${camera.longitude}`;
        const isOnline = status === "ONLINE";
        const streamUrl = buildStreamUrl(camera);
        const canStream = isOnline && streamUrl;

        // Unique video element ID per camera so hls.js targets the right one
        const videoId = `video-${escapeHtml(camera.camera_site || Math.random())}`;

        return `
          <div class="info-window">
            <div class="info-title">${escapeHtml(camera.camera_name || "Unknown camera")}</div>
            <div class="info-row"><strong>Site:</strong> ${escapeHtml(camera.camera_site || "N/A")}</div>
            <div class="info-row">
              <strong>Status:</strong>
              <span class="status-badge ${statusClass}">${escapeHtml(status)}</span>
            </div>
            <div class="info-row"><strong>Coordinates:</strong> ${camera.latitude}, ${camera.longitude}</div>

            ${canStream ? `
              <button class="load-feed-btn" onclick="loadFeed('${videoId}', '${streamUrl}', this)">
                ▶ Watch Live Feed
              </button>
              <div class="live-feed-container" id="container-${videoId}" style="display:none;">
                <video id="${videoId}" controls muted playsinline></video>
                <span class="live-badge">LIVE</span>
              </div>
            ` : `
              <div class="feed-error">
                ${isOnline ? "Live feed unavailable" : "Camera is offline — no live feed"}
              </div>
            `}

            <div class="info-actions">
              <a href="${mapsLink}" target="_blank" rel="noopener noreferrer">Open in Google Maps</a>
            </div>
          </div>
        `;
      }

      // ── Live feed loader ───────────────────────────────────
      //
      // Fundamental concept:
      // We load the feed lazily — only when the user clicks the button.
      // This avoids starting dozens of video streams just from opening
      // the map. Each click initialises one hls.js instance for that
      // specific camera's stream URL.

      function loadFeed(videoId, streamUrl, btn) {
        const container = document.getElementById(`container-${videoId}`);
        const video = document.getElementById(videoId);

        btn.style.display = "none";
        container.style.display = "block";

        if (typeof Hls === "undefined") {
          container.innerHTML = '<div class="feed-error">Stream player not loaded. Please refresh.</div>';
          return;
        }

        if (Hls.isSupported()) {
          // Most browsers: use hls.js to play the stream
          const hls = new Hls({
            maxBufferLength: 10,
            maxMaxBufferLength: 20,
          });
          hls.loadSource(streamUrl);
          hls.attachMedia(video);
          hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
          hls.on(Hls.Events.ERROR, (event, data) => {
            if (data.fatal) {
              container.innerHTML = '<div class="feed-error">Stream unavailable — camera may be offline or restricted.</div>';
            }
          });
        } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
          // Safari: supports HLS natively
          video.src = streamUrl;
          video.play();
        } else {
          container.innerHTML = '<div class="feed-error">Your browser does not support live streaming.</div>';
        }
      }

      // ── Bikeshare ──────────────────────────────────────────
      //
      // Fundamental concept: two API calls, joined by station_id
      // station_information = static (name, location, capacity)
      // station_status      = live   (bikes available, docks available)
      // We fetch both, build an index of status by station_id,
      // then merge when building markers.

      function getBikeMarkerIcon(bikesAvailable) {
        const emoji = bikesAvailable > 0 ? "🚲" : "🔒";
        const svg = `
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 28 28">
            <text y="22" font-size="22" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif">${emoji}</text>
          </svg>`;
        return {
          url: "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg),
          scaledSize: new google.maps.Size(28, 28),
          anchor: new google.maps.Point(14, 14),
        };
      }

      function buildBikeInfoContent(station, status) {
        const bikes = status ? status.num_bikes_available : "?";
        const docks = status ? status.num_docks_available : "?";
        const updated = status
          ? new Date(status.last_reported * 1000).toLocaleTimeString()
          : "unknown";

        return `
          <div class="bike-info-window">
            <div class="bike-info-title">${escapeHtml(station.name)}</div>
            <div class="bike-availability">
              <div class="bike-stat bikes">
                <div class="bike-stat-number">${bikes}</div>
                <div class="bike-stat-label">Bikes</div>
              </div>
              <div class="bike-stat docks">
                <div class="bike-stat-number">${docks}</div>
                <div class="bike-stat-label">Docks</div>
              </div>
            </div>
            <div class="bike-capacity">Station capacity: ${station.capacity} docks</div>
            <div class="bike-last-updated">Updated: ${updated}</div>
          </div>`;
      }

      async function fetchBikeStatus() {
        // Fundamental concept: we refresh status every 30 seconds
        // because GBFS TTL is 60s — fetching at half the TTL keeps data fresh
        const res = await fetch(GBFS_STATION_STATUS);
        const json = await res.json();
        bikeStatusIndex = {};
        for (const s of json.data.stations) {
          bikeStatusIndex[s.station_id] = s;
        }
        // Update existing marker icons to reflect new availability
        for (const marker of bikeMarkers) {
          const status = bikeStatusIndex[marker.stationId];
          const bikes = status ? status.num_bikes_available : 0;
          marker.setIcon(getBikeMarkerIcon(bikes));
        }
      }

      async function loadBikeMarkers() {
        const [infoRes, statusRes] = await Promise.all([
          fetch(GBFS_STATION_INFO),
          fetch(GBFS_STATION_STATUS)
        ]);
        const infoJson   = await infoRes.json();
        const statusJson = await statusRes.json();

        // Build status index
        bikeStatusIndex = {};
        for (const s of statusJson.data.stations) {
          bikeStatusIndex[s.station_id] = s;
        }

        // Build markers — only for Arlington stations
        bikeMarkers = [];
        for (const station of infoJson.data.stations) {
          const { lat, lon, station_id } = station;

          // Filter to Arlington bounding box only
          if (lat < ARLINGTON.latMin || lat > ARLINGTON.latMax ||
              lon < ARLINGTON.lngMin || lon > ARLINGTON.lngMax) continue;

          const status = bikeStatusIndex[station_id];
          const bikes  = status ? status.num_bikes_available : 0;

          const marker = new google.maps.Marker({
            position: { lat, lng: lon },
            title: station.name,
            icon: getBikeMarkerIcon(bikes),
            map: null, // hidden until toggled on
          });

          marker.stationId = station_id;
          marker.stationData = station;

          marker.addListener("click", () => {
            const liveStatus = bikeStatusIndex[station_id];
            infoWindow.setContent(buildBikeInfoContent(station, liveStatus));
            infoWindow.open({ map, anchor: marker });
          });

          bikeMarkers.push(marker);
        }
      }

      function showBikeMarkers() {
        bikeMarkers.forEach(m => m.setMap(map));
        // Refresh status every 30 seconds while visible
        bikeRefreshInterval = setInterval(fetchBikeStatus, 30000);
      }

      function hideBikeMarkers() {
        bikeMarkers.forEach(m => m.setMap(null));
        clearInterval(bikeRefreshInterval);
      }

      // ── Map rendering ──────────────────────────────────────

      function fitToMarkers(markers) {
        if (!markers.length) return;
        const bounds = new google.maps.LatLngBounds();
        markers.forEach(m => bounds.extend(m.getPosition()));
        map.fitBounds(bounds);
        google.maps.event.addListenerOnce(map, "bounds_changed", () => {
          if (map.getZoom() > 14) map.setZoom(14);
        });
      }

      function renderMarkers(markersToShow) {
        if (clusterer) clusterer.clearMarkers();
        allMarkers.forEach(m => m.setMap(null));
        markersToShow.forEach(m => m.setMap(map));

        clusterer = new markerClusterer.MarkerClusterer({ map, markers: markersToShow });
        document.getElementById("resultCount").textContent =
          `${markersToShow.length} camera(s) shown`;

        if (markersToShow.length) fitToMarkers(markersToShow);
      }

      function applySearch() {
        const query = document.getElementById("cameraSearch").value.trim().toLowerCase();
        if (!query) { renderMarkers(allMarkers); return; }

        const filtered = allMarkers.filter(marker => {
          const c = marker.cameraData;
          return [c.camera_name, c.camera_site, c.status, c.port]
            .filter(Boolean)
            .some(v => String(v).toLowerCase().includes(query));
        });
        renderMarkers(filtered);
      }

      // ── Map initialisation ─────────────────────────────────

      async function initMap() {
        map = new google.maps.Map(document.getElementById("map"), {
          center: { lat: 38.8816, lng: -77.0910 },
          zoom: 13,
          mapTypeControl: true,
          fullscreenControl: true,
          streetViewControl: false,
          scaleControl: true,
        });

        trafficLayer = new google.maps.TrafficLayer();
        trafficLayer.setMap(map);
        infoWindow = new google.maps.InfoWindow();

        const response = await fetch("./traffic_cameras_clean.json");
        const cameras = await response.json();

        const validCameras = cameras.filter(c =>
          typeof c.latitude === "number" &&
          typeof c.longitude === "number" &&
          (c.camera_name || c.camera_site)
        );

        allMarkers = validCameras.map(c => {
          const marker = new google.maps.Marker({
            position: { lat: c.latitude, lng: c.longitude },
            title: c.camera_name || c.camera_site || "Camera",
            icon: getMarkerIcon(c.status),
          });

          marker.cameraData = c;

          marker.addListener("click", () => {
            infoWindow.setContent(buildInfoContent(c));
            infoWindow.open({ map, anchor: marker });
          });

          return marker;
        });

        renderMarkers(allMarkers);

        document.getElementById("searchBtn").addEventListener("click", applySearch);
        document.getElementById("resetBtn").addEventListener("click", () => {
          document.getElementById("cameraSearch").value = "";
          renderMarkers(allMarkers);
        });
        document.getElementById("cameraSearch").addEventListener("keydown", e => {
          if (e.key === "Enter") applySearch();
        });
        document.getElementById("toggleCameraBtn").addEventListener("click", () => {
          const btn = document.getElementById("toggleCameraBtn");
          const showing = btn.textContent === "Hide Cameras";
          if (showing) {
            allMarkers.forEach(m => m.setMap(null));
            if (clusterer) clusterer.clearMarkers();
            btn.textContent = "Show Cameras";
            btn.style.background = "#5f6368";
          } else {
            renderMarkers(allMarkers);
            btn.textContent = "Hide Cameras";
            btn.style.background = "";
          }
        });

        document.getElementById("toggleTrafficBtn").addEventListener("click", () => {
          trafficVisible = !trafficVisible;
          trafficLayer.setMap(trafficVisible ? map : null);
          document.getElementById("toggleTrafficBtn").textContent =
            trafficVisible ? "Hide Traffic" : "Show Traffic";
        });

        // Load bikeshare stations in the background
        await loadBikeMarkers();

        document.getElementById("toggleBikeBtn").addEventListener("click", () => {
          bikeVisible = !bikeVisible;
          if (bikeVisible) {
            showBikeMarkers();
            document.getElementById("toggleBikeBtn").textContent = "Hide Bikeshare";
            document.getElementById("toggleBikeBtn").style.background = "#e65c00";
          } else {
            hideBikeMarkers();
            document.getElementById("toggleBikeBtn").textContent = "Show Bikeshare";
            document.getElementById("toggleBikeBtn").style.background = "";
          }
        });
      }
    </script>

    <!-- hls.js — enables HLS stream playback in non-Safari browsers -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
    <script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>
    <script
      src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAY5DaIF5Uuc3dEInFrfDxkZeC7WciFspk&callback=initMap"
      async
      defer
    ></script>
  </body>
</html>
